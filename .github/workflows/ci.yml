name: ADDS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.3.4
      - name: Ruff syntax-only check (E9)
        run: |
          ruff check src/ backend/ --select=E9 --output-format=github
          echo "Syntax check passed"

  test-science:
    name: Science Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Setup env
        run: |
          mkdir -p data/samples logs
          printf 'OPENAI_API_KEY=test\nDB_PATH=:memory:\n' > .env
      - name: Run core science tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/test_science_core.py -v --tb=short -p no:warnings
      - name: Run unit module tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/test_unit_modules.py -v --tb=short -p no:warnings
      - name: Coverage report
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/test_science_core.py tests/test_unit_modules.py \
            --cov=src/utils --cov=src/evaluation --cov=src/data \
            --cov-report=term-missing \
            -p no:warnings -q
          echo "Coverage report generated"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install bandit
        run: pip install bandit
      - name: Run scan
        run: bandit -r src/ backend/ -ll --exit-zero
